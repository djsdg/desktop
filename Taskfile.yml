version: "3"

tasks:
  default:
    cmds:
      - task: list

  install:
    desc: Install all dependencies for the project
    cmds:
      - pnpm install
      - cargo fetch
      - task: build

  list:
    desc: List all tasks in the current project
    cmds:
      - task --list

  lint:
    desc: Run linters on all crates
    silent: true
    cmds:
      - cargo clippy --workspace -- -D warnings

  build:
    desc: Build all crates
    cmds:
      - cargo build --workspace

  export-contracts:
    desc: Regenerate TypeScript contracts and the frontend SDK package
    cmds:
      - cargo xtask export-contracts

  test:
    desc: Run contract package tests and Rust tests
    silent: true
    cmds:
      - task: lint
      - task: export-contracts
      - pnpm --filter @ora/contracts test
      - cargo test --workspace

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf node_modules
      - pnpm -r exec -- pnpm pm clean
      - pnpm store prune
      - cargo clean
